<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass {
            background: rgba(13, 18, 30, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        /* Hide scrollbars but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-200 min-h-screen font-sans antialiased selection:bg-indigo-500/30 selection:text-indigo-200">

    <!-- AUTHENTICATION LAYER -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#070a12] transition-all duration-500 ease-out p-4">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(99,102,241,0.05),transparent_60%)]"></div>
        <div class="glass w-full max-w-md p-6 sm:p-8 rounded-2xl border border-slate-800/60 shadow-2xl relative transition-all duration-500">
            <div class="flex flex-col items-center mb-6">
                <div class="p-3 bg-indigo-600/10 text-indigo-400 rounded-xl border border-indigo-500/20 mb-3">
                    <i data-lucide="terminal" class="w-6 h-6 stroke-[1.5]"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-100">LifeOS Central</h1>
                <p class="text-[11px] text-slate-500 font-mono mt-0.5">Authentication Required</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Email Address</label>
                    <input type="email" id="login-username" required class="w-full bg-slate-900/40 border border-slate-800/80 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 transition-all" placeholder="name@email.com">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Password</label>
                    <input type="password" id="login-password" required class="w-full bg-slate-900/40 border border-slate-800/80 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/10 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium py-2.5 rounded-xl transition-all duration-150 shadow-lg shadow-indigo-600/10 text-sm mt-2 flex items-center justify-center gap-2">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN CONTROL DASHBOARD -->
    <div id="dashboard-screen" class="hidden opacity-0 transform translate-y-2 transition-all duration-500 ease-out pb-12">
        <!-- Header -->
        <header class="border-b border-slate-900/60 sticky top-0 z-40 glass">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <div class="p-2 bg-indigo-600/10 text-indigo-400 rounded-lg border border-indigo-500/15">
                        <i data-lucide="activity" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <h2 class="text-sm font-bold tracking-tight text-slate-200">LifeOS.<span id="user-display" class="text-indigo-400 text-xs font-mono uppercase">USER</span></h2>
                    </div>
                </div>
                <button id="logout-btn" class="flex items-center gap-1.5 px-3 py-1.5 border border-slate-800 rounded-lg text-xs font-medium text-slate-400 hover:text-rose-400 hover:border-rose-500/20 hover:bg-rose-500/5 transition-all">
                    <i data-lucide="log-out" class="w-3.5 h-3.5"></i>
                    <span class="hidden sm:inline">Disconnect</span>
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
            <!-- Analytics Grid -->
            <section class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
                <div class="glass p-4 rounded-xl border border-slate-800/60 flex items-center justify-between shadow-sm">
                    <div>
                        <p class="text-[10px] font-mono text-slate-500 uppercase tracking-wider">Total Items</p>
                        <h3 id="stat-total" class="text-xl font-bold mt-0.5 text-slate-200">0</h3>
                    </div>
                    <div class="p-2 bg-slate-900 text-indigo-400 rounded-lg border border-slate-800/40"><i data-lucide="layers" class="w-4 h-4"></i></div>
                </div>
                <div class="glass p-4 rounded-xl border border-slate-800/60 flex items-center justify-between shadow-sm">
                    <div>
                        <p class="text-[10px] font-mono text-slate-500 uppercase tracking-wider">Completed</p>
                        <h3 id="stat-completed" class="text-xl font-bold mt-0.5 text-emerald-400">0</h3>
                    </div>
                    <div class="p-2 bg-slate-900 text-emerald-400 rounded-lg border border-slate-800/40"><i data-lucide="check-circle-2" class="w-4 h-4"></i></div>
                </div>
                <div class="glass p-4 rounded-xl border border-slate-800/60 flex items-center justify-between shadow-sm">
                    <div>
                        <p class="text-[10px] font-mono text-slate-500 uppercase tracking-wider">Efficiency</p>
                        <h3 id="stat-efficiency" class="text-xl font-bold mt-0.5 text-cyan-400">0%</h3>
                    </div>
                    <div class="p-2 bg-slate-900 text-cyan-400 rounded-lg border border-slate-800/40"><i data-lucide="percent" class="w-4 h-4"></i></div>
                </div>
                <div id="stat-today-card" onclick="window.toggleTodayFilter()" class="glass p-4 rounded-xl border border-slate-800/60 flex items-center justify-between shadow-sm cursor-pointer group transition-all duration-200 hover:border-slate-700">
                    <div>
                        <p id="stat-today-label" class="text-[10px] font-mono text-slate-500 uppercase tracking-wider">Due Today</p>
                        <h3 id="stat-today" class="text-xl font-bold mt-0.5 text-rose-400">0</h3>
                    </div>
                    <div id="stat-today-icon-bg" class="p-2 bg-slate-900 text-slate-500 rounded-lg border border-slate-800/40 group-hover:text-rose-400 transition-all duration-200">
                        <i data-lucide="calendar" class="w-4 h-4"></i>
                    </div>
                </div>
            </section>

            <!-- Main Split Layout Engine -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                
                <!-- Entry Form Component -->
                <div class="glass p-5 rounded-2xl border border-slate-800/60 shadow-md lg:sticky lg:top-24">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2 font-mono">
                        <i data-lucide="plus-circle" class="w-3.5 h-3.5 text-indigo-400"></i>
                        <span>New Entry Matrix</span>
                    </h3>
                    <form id="item-form" class="space-y-3.5">
                        <div>
                            <label class="block text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1">Description / Title</label>
                            <input type="text" id="item-title" required class="w-full bg-slate-900/40 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition-colors placeholder-slate-700" placeholder="Task details...">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1">Category</label>
                                <select id="item-category" class="w-full bg-[#0d121e] border border-slate-800 rounded-xl px-2.5 py-2 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors">
                                    <option value="Personal">Personal</option>
                                    <option value="University">University</option>
                                    <option value="Work">Work</option>
                                    <option value="Misc">Misc</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1">Priority</label>
                                <select id="item-priority" class="w-full bg-[#0d121e] border border-slate-800 rounded-xl px-2.5 py-2 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1">Target Date</label>
                            <input type="date" id="item-duedate" class="w-full bg-slate-900/40 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors">
                        </div>
                        <button type="submit" class="w-full bg-slate-900 hover:bg-indigo-600 border border-slate-800 hover:border-indigo-500 text-slate-300 hover:text-white text-[11px] font-bold py-2.5 rounded-xl transition-all tracking-wider uppercase mt-1">
                            Commit Entry
                        </button>
                    </form>
                </div>

                <!-- Stream & Filtering Infrastructure -->
                <div class="lg:col-span-2 space-y-4">
                    
                    <!-- Filters Utility Toolbar -->
                    <div class="glass p-3 rounded-xl border border-slate-800/60 flex flex-col md:flex-row gap-3 items-center justify-between shadow-sm">
                        <!-- Horizontal Scroll Category Matrix -->
                        <div class="flex gap-1 overflow-x-auto w-full md:w-auto no-scrollbar pb-1 md:pb-0 border-b border-slate-900 md:border-none">
                            <button id="tab-all" onclick="window.switchTab('all')" class="tab-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-all shrink-0 bg-indigo-600/10 text-indigo-400 border border-indigo-500/20">All Arrays</button>
                            <button id="tab-Personal" onclick="window.switchTab('Personal')" class="tab-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-all shrink-0 text-slate-400 hover:text-slate-200 border border-transparent">Personal</button>
                            <button id="tab-University" onclick="window.switchTab('University')" class="tab-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-all shrink-0 text-slate-400 hover:text-slate-200 border border-transparent">University</button>
                            <button id="tab-Work" onclick="window.switchTab('Work')" class="tab-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-all shrink-0 text-slate-400 hover:text-slate-200 border border-transparent">Work</button>
                            <button id="tab-Misc" onclick="window.switchTab('Misc')" class="tab-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-all shrink-0 text-slate-400 hover:text-slate-200 border border-transparent">Misc</button>
                        </div>
                        
                        <!-- Utility Queries -->
                        <div class="flex gap-2 w-full md:w-auto items-center">
                            <div class="relative flex-1 md:w-44">
                                <i data-lucide="search" class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-slate-600"></i>
                                <input type="text" id="search-bar" class="w-full bg-slate-900/60 border border-slate-800 rounded-lg pl-8 pr-2 py-1.5 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500" placeholder="Scan filter...">
                            </div>
                            <select id="completion-filter" class="bg-slate-900/60 border border-slate-800 rounded-lg px-2 py-1.5 text-xs text-slate-400 focus:outline-none focus:border-indigo-500 h-8">
                                <option value="all">Unfiltered</option>
                                <option value="active">Active</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                    </div>

                    <!-- Main Stream Box Header -->
                    <div class="flex items-center justify-between px-1">
                        <h4 id="stream-heading" class="text-[10px] font-mono font-bold uppercase tracking-widest text-slate-500">Everything Stream</h4>
                        <span id="counter-badge" class="text-[9px] font-mono px-2 py-0.5 rounded-full bg-slate-900 text-slate-600 border border-slate-800/60">0 Items Evaluated</span>
                    </div>

                    <!-- Layout Array Container -->
                    <div id="data-stream" class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
                        <!-- Rendered via Engine App Logic -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Script Configuration Injection Router -->
    <script type="module" src="app.js"></script>
</body>
</html>
