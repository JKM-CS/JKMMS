<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass {
            background: rgba(13, 18, 30, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Theme Theme Core Variable Injectors */
        body.theme-slate { --theme-primary: 99, 102, 241; --theme-bg: #0b0f19; --theme-surface: rgba(13, 18, 30, 0.45); }
        body.theme-emerald { --theme-primary: 16, 185, 129; --theme-bg: #060f0e; --theme-surface: rgba(10, 25, 23, 0.45); }
        body.theme-amber { --theme-primary: 245, 158, 11; --theme-bg: #140f06; --theme-surface: rgba(28, 20, 10, 0.45); }
        body.theme-rose { --theme-primary: 244, 63, 94; --theme-bg: #120a0d; --theme-surface: rgba(26, 12, 17, 0.45); }
        body.theme-violet { --theme-primary: 139, 92, 246; --theme-bg: #100a1c; --theme-surface: rgba(20, 12, 32, 0.45); }

        body { bg-color: var(--theme-bg); transition: background-color 0.3s ease; }
        .dynamic-glass { background: var(--theme-surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .border-theme { border-color: rgba(var(--theme-primary), 0.15); }
        .border-theme-active { border-color: rgba(var(--theme-primary), 0.4); }
        .text-theme { color: rgb(var(--theme-primary)); }
        .bg-theme { background-color: rgb(var(--theme-primary)); }
        .bg-theme-hover:hover { background-color: rgba(var(--theme-primary), 0.85); }
        .bg-theme-opacity { background-color: rgba(var(--theme-primary), 0.1); }
        .focus-theme:focus { border-color: rgb(var(--theme-primary)); box-shadow: 0 0 0 2px rgba(var(--theme-primary), 0.1); }
    </style>
</head>
<body class="theme-slate text-slate-200 min-h-screen font-sans antialiased selection:bg-indigo-500/30 selection:text-indigo-200" id="main-body">

    <!-- AUTHENTICATION LAYER -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#070a12] transition-all duration-500 ease-out p-4">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(99,102,241,0.05),transparent_60%)]"></div>
        <div class="glass w-full max-w-md p-6 sm:p-8 rounded-2xl border border-slate-800/60 shadow-2xl relative transition-all duration-500">
            <div class="flex flex-col items-center mb-6">
                <div class="p-3 bg-indigo-600/10 text-indigo-400 rounded-xl border border-indigo-500/20 mb-3">
                    <i data-lucide="terminal" class="w-6 h-6 stroke-[1.5]"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-100">LifeOS Central</h1>
                <p class="text-[11px] text-slate-500 font-mono mt-0.5">Authentication Required</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Email Address</label>
                    <input type="email" id="login-username" required class="w-full bg-slate-900/40 border border-slate-800/80 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all" placeholder="name@email.com">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-1.5 font-mono">Password</label>
                    <input type="password" id="login-password" required class="w-full bg-slate-900/40 border border-slate-800/80 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-xl transition-all shadow-lg text-sm mt-2 flex items-center justify-center gap-2">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN CONTROL DASHBOARD -->
    <div id="dashboard-screen" class="hidden opacity-0 transform translate-y-2 transition-all duration-500 ease-out pb-12">
        <!-- Header -->
        <header class="border-b border-slate-900/60 sticky top-0 z-40 dynamic-glass border-theme">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
                <div class="flex items-center gap-2.5 min-w-0">
                    <div class="p-2 bg-theme-opacity text-theme rounded-lg border border-theme">
                        <i data-lucide="activity" class="w-4 h-4"></i>
                    </div>
                    <div class="min-w-0">
                        <h2 class="text-sm font-bold tracking-tight text-slate-200 truncate">LifeOS.<span id="user-display" class="text-theme text-xs font-mono uppercase">USER</span></h2>
                    </div>
                </div>

                <!-- Global Sync Config Toolbar -->
                <div class="flex items-center gap-2 shrink-0">
                    <!-- Language Selection Node -->
                    <select id="global-lang-select" class="bg-slate-900/80 border border-slate-800 rounded-lg px-2 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 h-8 cursor-pointer">
                        <option value="en">English</option>
                        <option value="ar">العربية</option>
                        <option value="ku">کوردی</option>
                    </select>

                    <!-- Theme Matrix Node -->
                    <select id="global-theme-select" class="bg-slate-900/80 border border-slate-800 rounded-lg px-2 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 h-8 cursor-pointer">
                        <option value="theme-slate">Deep Cyan</option>
                        <option value="theme-emerald">Matrix Emerald</option>
                        <option value="theme-amber">Cyber Amber</option>
                        <option value="theme-rose">Crimson Rose</option>
                        <option value="theme-violet">Neo Violet</option>
                    </select>

                    <button id="logout-btn" class="flex items-center gap-1.5 px-2.5 py-1.5 border border-slate-800 rounded-lg text-xs font-medium text-slate-400 hover:text-rose-400 transition-all h-8">
                        <i data-lucide="log-out" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
            <!-- Analytics Grid -->
            <section class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
                <div class="dynamic-glass p-4 rounded-xl border border-slate-800/60 flex items-center justify-between shadow-sm border-theme">
                    <div>
                        <p id="lbl-stat-total" class="text-[10px] font-mono text-slate-500 uppercase tracking-wider">Total Items</p>
                        <h3 id="stat-total" class="text-xl font-bold mt-0.5 text-slate-200">0</h3>
                    </div>
                    <div class="p-2 bg-slate-900 text-theme rounded-lg border border-slate-800/40"><i data-lucide="layers" class="w-4 h-4"></i></div>
                </div>
                <div class="dynamic-glass p-4 rounded-xl border border-slate-800/60 flex items-center justify-between shadow-sm border-theme">
                    <div>
                        <p id="lbl-stat-completed" class="text-[10px] font-mono text-slate-500 uppercase tracking-wider">Completed</p>
                        <h3 id="stat-completed" class="text-xl font-bold mt-0.5 text-emerald-400">0</h3>
                    </div>
                    <div class="p-2 bg-slate-900 text-emerald-400 rounded-lg border border-slate-800/40"><i data-lucide="check-circle-2" class="w-4 h-4"></i></div>
                </div>
                <div class="dynamic-glass p-4 rounded-xl border border-slate-800/60 flex items-center justify-between shadow-sm border-theme">
                    <div>
                        <p id="lbl-stat-efficiency" class="text-[10px] font-mono text-slate-500 uppercase tracking-wider">Efficiency</p>
                        <h3 id="stat-efficiency" class="text-xl font-bold mt-0.5 text-cyan-400">0%</h3>
                    </div>
                    <div class="p-2 bg-slate-900 text-cyan-400 rounded-lg border border-slate-800/40"><i data-lucide="percent" class="w-4 h-4"></i></div>
                </div>
                <div id="stat-today-card" onclick="window.toggleTodayFilter()" class="dynamic-glass p-4 rounded-xl border border-slate-800/60 flex items-center justify-between shadow-sm cursor-pointer group transition-all duration-200 hover:border-theme-active border-theme">
                    <div>
                        <p id="stat-today-label" class="text-[10px] font-mono text-slate-500 uppercase tracking-wider">Due Today</p>
                        <h3 id="stat-today" class="text-xl font-bold mt-0.5 text-rose-400">0</h3>
                    </div>
                    <div id="stat-today-icon-bg" class="p-2 bg-slate-900 text-slate-500 rounded-lg border border-slate-800/40 group-hover:text-theme transition-all duration-200">
                        <i data-lucide="calendar" class="w-4 h-4"></i>
                    </div>
                </div>
            </section>

            <!-- Main Split Layout Engine -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                
                <!-- Entry Form Component -->
                <div class="dynamic-glass p-5 rounded-2xl border border-slate-800/60 shadow-md lg:sticky lg:top-24 border-theme">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2 font-mono">
                        <i data-lucide="plus-circle" class="w-3.5 h-3.5 text-theme"></i>
                        <span id="lbl-matrix-title">New Entry Matrix</span>
                    </h3>
                    <form id="item-form" class="space-y-3.5">
                        <div>
                            <label id="lbl-field-desc" class="block text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1">Description / Title</label>
                            <input type="text" id="item-title" required class="w-full bg-slate-900/40 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus-theme transition-all placeholder-slate-700" placeholder="...">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label id="lbl-field-cat" class="block text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1">Category</label>
                                <select id="item-category" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-2.5 py-2 text-xs text-slate-300 focus:outline-none focus-theme transition-colors">
                                    <option value="Personal" id="opt-cat-personal">Personal</option>
                                    <option value="University" id="opt-cat-uni">University</option>
                                    <option value="Work" id="opt-cat-work">Work</option>
                                    <option value="Misc" id="opt-cat-misc">Misc</option>
                                </select>
                            </div>
                            <div>
                                <label id="lbl-field-priority" class="block text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1">Priority</label>
                                <select id="item-priority" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-2.5 py-2 text-xs text-slate-300 focus:outline-none focus-theme transition-colors">
                                    <option value="Low" id="opt-pr-low">Low</option>
                                    <option value="Medium" id="opt-pr-med" selected>Medium</option>
                                    <option value="High" id="opt-pr-high">High</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label id="lbl-field-date" class="block text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1">Target Date</label>
                            <input type="date" id="item-duedate" class="w-full bg-slate-900/40 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-300 focus:outline-none focus-theme transition-colors">
                        </div>
                        <button type="submit" id="lbl-btn-submit" class="w-full bg-slate-900 hover:bg-theme border border-slate-800 hover:border-theme text-slate-300 hover:text-white text-[11px] font-bold py-2.5 rounded-xl transition-all tracking-wider uppercase mt-1">
                            Commit Entry
                        </button>
                    </form>
                </div>

                <!-- Stream & Filtering Infrastructure -->
                <div class="lg:col-span-2 space-y-4">
                    
                    <!-- Filters Utility Toolbar -->
                    <div class="dynamic-glass p-3 rounded-xl border border-slate-800/60 flex flex-col md:flex-row gap-3 items-center justify-between shadow-sm border-theme">
                        <!-- Horizontal Scroll Category Matrix -->
                        <div id="tab-container" class="flex gap-1 overflow-x-auto w-full md:w-auto no-scrollbar pb-1 md:pb-0 border-b border-slate-900 md:border-none">
                            <button id="tab-all" onclick="window.switchTab('all')" class="tab-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-all shrink-0 bg-theme-opacity text-theme border border-theme">All Arrays</button>
                            <button id="tab-Personal" onclick="window.switchTab('Personal')" class="tab-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-all shrink-0 text-slate-400 hover:text-slate-200 border border-transparent">Personal</button>
                            <button id="tab-University" onclick="window.switchTab('University')" class="tab-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-all shrink-0 text-slate-400 hover:text-slate-200 border border-transparent">University</button>
                            <button id="tab-Work" onclick="window.switchTab('Work')" class="tab-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-all shrink-0 text-slate-400 hover:text-slate-200 border border-transparent">Work</button>
                            <button id="tab-Misc" onclick="window.switchTab('Misc')" class="tab-btn text-xs font-medium px-3 py-1.5 rounded-lg transition-all shrink-0 text-slate-400 hover:text-slate-200 border border-transparent">Misc</button>
                        </div>
                        
                        <!-- Utility Queries -->
                        <div class="flex gap-2 w-full md:w-auto items-center">
                            <div class="relative flex-1 md:w-44">
                                <i data-lucide="search" class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-slate-600"></i>
                                <input type="text" id="search-bar" class="w-full bg-slate-900/60 border border-slate-800 rounded-lg pl-8 pr-2 py-1.5 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-theme" placeholder="...">
                            </div>
                            <select id="completion-filter" class="bg-slate-900/60 border border-slate-800 rounded-lg px-2 py-1.5 text-xs text-slate-400 focus:outline-none focus:border-theme h-8">
                                <option value="all" id="opt-filter-all">Unfiltered</option>
                                <option value="active" id="opt-filter-active">Active</option>
                                <option value="completed" id="opt-filter-comp">Completed</option>
                            </select>
                        </div>
                    </div>

                    <!-- Main Stream Box Header -->
                    <div class="flex items-center justify-between px-1">
                        <h4 id="stream-heading" class="text-[10px] font-mono font-bold uppercase tracking-widest text-slate-500">Everything Stream</h4>
                        <span id="counter-badge" class="text-[9px] font-mono px-2 py-0.5 rounded-full bg-slate-900 text-slate-600 border border-slate-800/60">0 Items</span>
                    </div>

                    <!-- Layout Array Container -->
                    <div id="data-stream" class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
