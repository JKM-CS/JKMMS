<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maccannoli Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">

    <!-- 1. AUTHENTICATION LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 bg-zinc-950 flex items-center justify-center p-6 z-50">
        <div class="max-w-sm w-full bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl">
            <h1 class="text-xl font-black text-yellow-400 tracking-wider mb-2 text-center">MACCANNOLI HQ</h1>
            <p class="text-xs text-zinc-400 mb-6 text-center">Please log in to manage the system menu and configurations.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1 font-bold">Email Address</label>
                    <input type="email" id="login-email" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-yellow-400 text-white">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1 font-bold">Password</label>
                    <input type="password" id="login-password" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-yellow-400 text-white">
                </div>
                <p id="login-error" class="text-xs text-red-400 hidden text-center font-medium"></p>
                <button onclick="handleLogin()" id="login-btn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black font-extrabold py-3 rounded-xl text-xs tracking-wide transition cursor-pointer">
                    Secure Sign In
                </button>
            </div>
        </div>
    </div>

    <!-- 2. PROTECTED INTERFACE APPLICATION CONTAINER -->
    <div id="admin-app" class="hidden">
        <header class="border-b border-zinc-900 bg-zinc-900/50 backdrop-blur sticky top-0 z-40 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                <h1 class="text-sm font-black tracking-wider uppercase text-zinc-200">System Live Controls</h1>
            </div>
            <button onclick="handleLogout()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-[11px] font-bold px-4 py-2 rounded-lg transition cursor-pointer">
                Log Out
            </button>
        </header>

        <main class="max-w-4xl mx-auto p-6">
            <!-- Your ongoing admin interface cards/tables live here -->
            <p class="text-sm text-zinc-400 italic">Authenticated session active. Ready for updates.</p>
        </main>
    </div>

    <!-- Firebase System Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpMpNyWRP3u6h4N4o2QPpWJ4cbvHtSrvM",
            authDomain: "maccannoli-83c54.firebaseapp.com",
            projectId: "maccannoli-83c54",
            storageBucket: "maccannoli-83c54.firebasestorage.app",
            messagingSenderId: "199923494866",
            appId: "1:199923494866:web:69bd2235d45fccce03220b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // State Listener: Toggles screen visibility automatically
        onAuthStateChanged(auth, (user) => {
            const overlay = document.getElementById("login-overlay");
            const appContainer = document.getElementById("admin-app");

            if (user) {
                overlay.classList.add("hidden");
                appContainer.classList.remove("hidden");
            } else {
                overlay.classList.remove("hidden");
                appContainer.classList.add("hidden");
            }
        });

        // Global functions mapped for legacy element actions
        window.handleLogin = async () => {
            const email = document.getElementById("login-email").value;
            const pass = document.getElementById("login-password").value;
            const errBox = document.getElementById("login-error");
            const btn = document.getElementById("login-btn");

            errBox.classList.add("hidden");
            btn.textContent = "Verifying Token...";

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                errBox.textContent = "Access Denied: Invalid credentials.";
                errBox.classList.remove("hidden");
                btn.textContent = "Secure Sign In";
            }
        };

        window.handleLogout = () => {
            signOut(auth);
        };
    </script>
</body>
</html>
