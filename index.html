<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 min-h-screen font-sans selection:bg-indigo-500/30 selection:text-indigo-200">

    <!-- AUTHENTICATION LAYER -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#020617] transition-all duration-500 ease-out p-4">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(99,102,241,0.08),transparent_60%)]"></div>
        <div class="glass w-full max-w-md p-8 rounded-3xl border border-slate-800/80 shadow-2xl relative transition-all duration-500">
            <div class="flex flex-col items-center mb-8">
                <div class="p-4 bg-indigo-600/10 text-indigo-400 rounded-2xl border border-indigo-500/20 mb-4">
                    <i data-lucide="terminal" class="w-8 h-8 stroke-[1.5]"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-100">LifeOS Central Login</h1>
                <p class="text-xs text-slate-500 font-mono mt-1">v2.4.0 Engine Verification</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 font-mono">Email Address</label>
                    <input type="email" id="login-username" required class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all text-sm" placeholder="name@email.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 font-mono">Password Matrix</label>
                    <input type="password" id="login-password" required class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all text-sm" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium py-3 rounded-xl transition-all duration-150 shadow-lg shadow-indigo-600/20 text-sm mt-2 flex items-center justify-center gap-2">
                    <span>Access Environment</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN CONTROL DASHBOARD -->
    <div id="dashboard-screen" class="hidden opacity-0 transform translate-y-4 transition-all duration-500 ease-out pb-12">
        <!-- Header -->
        <header class="border-b border-slate-900/80 sticky top-0 z-40 glass">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="p-2.5 bg-indigo-600/10 text-indigo-400 rounded-xl border border-indigo-500/15">
                        <i data-lucide="activity" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <span class="text-xs font-mono text-slate-500 uppercase tracking-widest block leading-none">Console</span>
                        <h2 class="text-lg font-bold tracking-tight text-slate-200 mt-0.5">LifeOS.<span id="user-display" class="text-indigo-400">USER</span></h2>
                    </div>
                </div>
                <button id="logout-btn" class="flex items-center gap-2 px-4 py-2 border border-slate-800 rounded-xl text-xs font-medium text-slate-400 hover:text-rose-400 hover:border-rose-500/20 hover:bg-rose-500/5 transition-all">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span>Disconnect</span>
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
            <!-- Analytics Grid -->
            <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="glass p-5 rounded-2xl border border-slate-800/80 flex items-center justify-between shadow-lg">
                    <div>
                        <p class="text-xs font-mono text-slate-500 uppercase tracking-wider">Total Stack</p>
                        <h3 id="stat-total" class="text-2xl font-bold mt-1 text-slate-200">0</h3>
                    </div>
                    <div class="p-3 bg-slate-800 text-indigo-400 rounded-xl"><i data-lucide="layers" class="w-5 h-5"></i></div>
                </div>
                <div class="glass p-5 rounded-2xl border border-slate-800/80 flex items-center justify-between shadow-lg">
                    <div>
                        <p class="text-xs font-mono text-slate-500 uppercase tracking-wider">Completed</p>
                        <h3 id="stat-completed" class="text-2xl font-bold mt-1 text-emerald-400">0</h3>
                    </div>
                    <div class="p-3 bg-slate-800 text-emerald-400 rounded-xl"><i data-lucide="check-circle-2" class="w-5 h-5"></i></div>
                </div>
                <div class="glass p-5 rounded-2xl border border-slate-800/80 flex items-center justify-between shadow-lg">
                    <div>
                        <p class="text-xs font-mono text-slate-500 uppercase tracking-wider">Efficiency Ratio</p>
                        <h3 id="stat-efficiency" class="text-2xl font-bold mt-1 text-cyan-400">0%</h3>
                    </div>
                    <div class="p-3 bg-slate-800 text-cyan-400 rounded-xl"><i data-lucide="percent" class="w-5 h-5"></i></div>
                </div>
                <div id="stat-today-card" onclick="window.toggleTodayFilter()" class="glass p-5 rounded-2xl border border-slate-800/80 flex items-center justify-between shadow-lg cursor-pointer group transition-all duration-300 hover:scale-[1.02]">
                    <div>
                        <p id="stat-today-label" class="text-xs font-mono text-slate-500 uppercase tracking-wider transition-colors duration-300">Due Today</p>
                        <h3 id="stat-today" class="text-2xl font-bold mt-1 text-rose-400">0</h3>
                    </div>
                    <div id="stat-today-icon-bg" class="p-3 bg-slate-800 text-slate-400 rounded-xl group-hover:rotate-12 transition-all duration-300">
                        <i data-lucide="calendar" class="w-5 h-5"></i>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                <!-- Entry Form Component -->
                <div class="lg:col-span-1 glass p-6 rounded-3xl border border-slate-800/80 shadow-xl sticky top-28">
                    <h3 class="text-base font-bold tracking-tight text-slate-200 mb-5 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4 text-indigo-400"></i>
                        <span>Append New Workspace Item</span>
                    </h3>
                    <form id="item-form" class="space-y-4">
                        <div>
                            <label class="block text-[11px] font-mono text-slate-500 uppercase tracking-wider mb-1.5">Task Description / Title</label>
                            <input type="text" id="item-title" required class="w-full bg-slate-900/40 border border-slate-800 rounded-xl px-3.5 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition-colors" placeholder="Type structural node entry...">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] font-mono text-slate-500 uppercase tracking-wider mb-1.5">Category Domain</label>
                                <select id="item-category" class="w-full bg-slate-900/40 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors">
                                    <option value="Personal" class="bg-slate-950">Personal</option>
                                    <option value="University" class="bg-slate-950">University</option>
                                    <option value="Work" class="bg-slate-950">Work</option>
                                    <option value="Misc" class="bg-slate-950">Misc</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[11px] font-mono text-slate-500 uppercase tracking-wider mb-1.5">Priority Layer</label>
                                <select id="item-priority" class="w-full bg-slate-900/40 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors">
                                    <option value="Low" class="bg-slate-950">Low</option>
                                    <option value="Medium" class="bg-slate-950" selected>Medium</option>
                                    <option value="High" class="bg-slate-950">High</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[11px] font-mono text-slate-500 uppercase tracking-wider mb-1.5">Target Completion Date</label>
                            <input type="date" id="item-duedate" class="w-full bg-slate-900/40 border border-slate-800 rounded-xl px-3.5 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors">
                        </div>
                        <button type="submit" class="w-full bg-slate-800 hover:bg-indigo-600 border border-slate-700/60 hover:border-indigo-500 text-slate-200 hover:text-white text-xs font-semibold py-3 rounded-xl transition-all duration-200 tracking-wide uppercase mt-2">
                            Commit Object Entry
                        </button>
                    </form>
                </div>

                <!-- Stream & Filtering Infrastructure -->
                <div class="lg:col-span-2 space-y-4">
                    <!-- Filters Utility Toolbar -->
                    <div class="glass p-4 rounded-2xl border border-slate-800/80 flex flex-col md:flex-row gap-4 items-center justify-between shadow-md">
                        <!-- Navigation Category Matrix -->
                        <div class="flex flex-wrap gap-1.5 p-1 bg-slate-950/60 rounded-xl border border-slate-900/80 w-full md:w-auto">
                            <button id="tab-all" onclick="window.switchTab('all')" class="tab-btn text-xs font-medium px-3.5 py-2 rounded-lg transition-all border border-transparent bg-indigo-600/10 text-indigo-400 border-indigo-500/20">All Arrays</button>
                            <button id="tab-Personal" onclick="window.switchTab('Personal')" class="tab-btn text-xs font-medium px-3.5 py-2 rounded-lg transition-all border border-transparent text-slate-400 hover:text-slate-200">Personal</button>
                            <button id="tab-University" onclick="window.switchTab('University')" class="tab-btn text-xs font-medium px-3.5 py-2 rounded-lg transition-all border border-transparent text-slate-400 hover:text-slate-200">University</button>
                            <button id="tab-Work" onclick="window.switchTab('Work')" class="tab-btn text-xs font-medium px-3.5 py-2 rounded-lg transition-all border border-transparent text-slate-400 hover:text-slate-200">Work</button>
                            <button id="tab-Misc" onclick="window.switchTab('Misc')" class="tab-btn text-xs font-medium px-3.5 py-2 rounded-lg transition-all border border-transparent text-slate-400 hover:text-slate-200">Misc</button>
                        </div>
                        
                        <!-- Utility Queries -->
                        <div class="flex gap-2 w-full md:w-auto items-center">
                            <div class="relative w-full md:w-48">
                                <i data-lucide="search" class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                                <input type="text" id="search-bar" class="w-full bg-slate-900/60 border border-slate-800 rounded-xl pl-9 pr-3 py-2 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-colors" placeholder="Scan system titles...">
                            </div>
                            <select id="completion-filter" class="bg-slate-900/60 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors h-8">
                                <option value="all">Unfiltered</option>
                                <option value="active">Active State</option>
                                <option value="completed">Completed State</option>
                            </select>
                        </div>
                    </div>

                    <!-- Main Stream Box -->
                    <div class="flex items-center justify-between px-2">
                        <h4 id="stream-heading" class="text-xs font-mono font-bold uppercase tracking-widest text-slate-400">Everything Stream</h4>
                        <span id="counter-badge" class="text-[10px] font-mono px-2 py-0.5 rounded-full bg-slate-900 text-slate-500 border border-slate-800">0 Items Evaluated</span>
                    </div>

                    <div id="data-stream" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                        <!-- Items rendered via App Engine dynamic payload -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Script Configuration Injection Router -->
    <script type="module" src="app.js"></script>
</body>
</html>
