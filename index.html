<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKMMS - Personal Management System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }
        .animate-pulse-slow { animation: pulse-slow 8s infinite ease-in-out; }
        .glass {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="h-full font-sans antialiased overflow-hidden relative">

    <!-- Background Ambient Glow Effects -->
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-indigo-600/20 blur-[120px] animate-pulse-slow pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-emerald-600/15 blur-[150px] animate-pulse-slow pointer-events-none" style="animation-delay: 2s;"></div>

    <!-- ================= LOGIN SCREEN ================= -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 transition-all duration-500 ease-in-out">
        <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl transform scale-100 transition-transform duration-300 hover:border-indigo-500/30">
            <div class="flex flex-col items-center mb-8">
                <div class="p-4 bg-indigo-600/20 text-indigo-400 rounded-2xl mb-3">
                    <i data-lucide="shield-check" class="w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">Welcome to JKMMS</h1>
                <p class="text-slate-400 text-sm mt-1">Your personal productivity command center.</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold tracking-wider uppercase text-slate-400 mb-2">Email Address</label>
                    <input type="email" id="login-email" required class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold tracking-wider uppercase text-slate-400 mb-2">Password</label>
                    <input type="password" id="login-password" required class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-medium py-3 px-4 rounded-xl shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/30 transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 flex items-center justify-center gap-2">
                    Access System <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ================= MAIN CORE DASHBOARD ================= -->
    <div id="dashboard-screen" class="hidden h-full flex flex-col transition-all duration-500 opacity-0 transform translate-y-4">
        <!-- Header Topbar -->
        <header class="glass border-b border-slate-800/60 px-8 py-4 flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-xl text-white">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent">LifeOS</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-sm font-medium text-slate-300 bg-slate-800/40 px-3 py-1.5 rounded-full border border-slate-700/30">User</span>
                <button id="logout-btn" class="text-slate-400 hover:text-rose-400 p-2 rounded-xl hover:bg-rose-500/10 transition-all duration-200" title="Logout">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Main Layout Section -->
        <div class="flex flex-1 overflow-hidden">
            <!-- Navigation Sidebar Panels -->
            <aside class="w-64 glass border-r border-slate-800/60 p-6 flex flex-col gap-2 z-10">
                <p class="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-2 px-3">Categories</p>
                <button onclick="switchTab('all')" id="tab-all" class="tab-btn active flex items-center gap-3 w-full px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 bg-indigo-600/10 text-indigo-400 border border-indigo-500/20">
                    <i data-lucide="layers" class="w-4 h-4"></i> Everything
                </button>
                <button onclick="switchTab('University')" id="tab-University" class="tab-btn flex items-center gap-3 w-full px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50">
                    <i data-lucide="graduation-cap" class="w-4 h-4"></i> University
                </button>
                <button onclick="switchTab('Work')" id="tab-Work" class="tab-btn flex items-center gap-3 w-full px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50">
                    <i data-lucide="briefcase" class="w-4 h-4"></i> Work
                </button>
                <button onclick="switchTab('Meetings')" id="tab-Meetings" class="tab-btn flex items-center gap-3 w-full px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50">
                    <i data-lucide="calendar" class="w-4 h-4"></i> Meetings & Tasks
                </button>
            </aside>

            <!-- Working Content Stream -->
            <main class="flex-1 overflow-y-auto p-8 space-y-8">
                <!-- Data Entry Component Form -->
                <section class="glass rounded-2xl p-6 shadow-xl border border-slate-800/80 transition-all hover:border-slate-700/50">
                    <h2 class="text-lg font-semibold text-slate-200 mb-4 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="text-indigo-400 w-5 h-5"></i> Log New Entry
                    </h2>
                    <form id="item-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-medium text-slate-400 mb-1.5">Task / Meeting Title</label>
                            <input type="text" id="item-title" required class="w-full bg-slate-900/80 border border-slate-700/60 rounded-xl px-4 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all" placeholder="Enter details here...">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5">Category Target</label>
                            <select id="item-category" class="w-full bg-slate-900/80 border border-slate-700/60 rounded-xl px-4 py-2.5 text-slate-200 focus:outline-none focus:border-indigo-500 transition-all">
                                <option value="University">🎓 University</option>
                                <option value="Work">🛠️ Work</option>
                                <option value="Meetings">📅 Meetings & Tasks</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-4 rounded-xl shadow-lg shadow-indigo-600/10 hover:shadow-indigo-600/20 transform hover:-translate-y-0.5 active:translate-y-0 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="sparkles" class="w-4 h-4"></i> Deploy Item
                        </button>
                    </form>
                </section>

                <!-- Activity Feed Stream Viewports -->
                <section>
                    <div class="flex justify-between items-center mb-4">
                        <h2 id="stream-heading" class="text-xl font-bold tracking-tight text-slate-200">Everything Stream</h2>
                        <span id="counter-badge" class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-xs px-2.5 py-1 rounded-md font-semibold">0 Items</span>
                    </div>
                    <!-- Live Target Container -->
                    <div id="data-stream" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </section>
            </main>
        </div>
    </div>

    <!-- Execution Module Linking Hooks -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
