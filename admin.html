<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maccannoli • Admin Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: #fafafa; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 1. AUTHENTICATION LOGIN OVERLAY (Shows when logged out) -->
    <div id="login-overlay" class="fixed inset-0 bg-zinc-950 flex items-center justify-center p-6 z-50">
        <div class="max-w-sm w-full bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl">
            <div class="mx-auto w-16 h-16 rounded-xl overflow-hidden border-2 border-zinc-800 mb-4">
                <img src="IMG_6187.png" alt="Maccannoli Logo" class="w-full h-full object-cover">
            </div>
            <h1 class="text-xl font-black text-yellow-400 tracking-wider mb-2 text-center">MACCANNOLI HQ</h1>
            <p class="text-xs text-zinc-400 mb-6 text-center">Please log in to manage the system menu and configurations.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1 font-bold">Email Address</label>
                    <input type="email" id="login-email" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-yellow-400 text-white" placeholder="admin@maccannoli.com">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1 font-bold">Password</label>
                    <input type="password" id="login-password" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-yellow-400 text-white" placeholder="••••••••">
                </div>
                <p id="login-error" class="text-xs text-red-400 hidden text-center font-medium"></p>
                <button onclick="handleLogin()" id="login-btn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black font-extrabold py-3 rounded-xl text-xs tracking-wide transition cursor-pointer">
                    Secure Sign In
                </button>
            </div>
        </div>
    </div>

    <!-- 2. SECURE PORTAL APPLICATION WRAPPER (Hidden until login passes) -->
    <div id="admin-app" class="hidden p-4 md:p-8">
        <div class="max-w-4xl mx-auto">
            
            <!-- Dashboard Header Navigation -->
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-zinc-800 pb-6 mb-8 gap-4">
                <div>
                    <h1 class="text-2xl font-black tracking-wide text-yellow-400">MACCANNOLI Portal</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                        <p class="text-zinc-500 text-xs">Live Connected Session</p>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto items-stretch sm:items-center">
                    <div class="bg-zinc-950 border border-zinc-800 p-3 rounded-2xl flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
                        <div>
                            <label class="block text-[10px] uppercase font-bold tracking-wider text-zinc-500 mb-1">WhatsApp Target Phone</label>
                            <input type="text" id="wa-input" class="bg-zinc-900 border border-zinc-800 rounded-xl px-3 py-1.5 text-xs font-bold text-white outline-none w-full sm:w-48" placeholder="964750...">
                        </div>
                        <button onclick="updateWhatsAppNumber()" class="bg-yellow-400 hover:bg-yellow-500 text-black font-extrabold text-xs px-4 py-2 rounded-xl transition cursor-pointer whitespace-nowrap">Save Number</button>
                    </div>
                    <button onclick="handleLogout()" class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-zinc-400 hover:text-zinc-200 text-xs font-bold px-4 py-3 rounded-2xl transition cursor-pointer">
                        Log Out
                    </button>
                </div>
            </header>

            <!-- Loading Live Data Matrix Placeholder -->
            <div id="loading-fallback" class="text-center py-12 bg-zinc-950 border border-zinc-900 rounded-3xl text-zinc-500 text-sm font-semibold">
                Downloading live Firestore database streams...
            </div>

            <!-- Main Live Interactive Editor Grid -->
            <main id="admin-main-container" class="space-y-6 hidden"></main>

        </div>
    </div>

    <!-- Firebase v10 Web Engine Modularity Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpMpNyWRP3u6h4N4o2QPpWJ4cbvHtSrvM",
            authDomain: "maccannoli-83c54.firebaseapp.com",
            projectId: "maccannoli-83c54",
            storageBucket: "maccannoli-83c54.firebasestorage.app",
            messagingSenderId: "199923494866",
            appId: "1:199923494866:web:69bd2235d45fccce03220b",
            measurementId: "G-EEMGQ3718G"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Bind secure Firebase nodes globally so old standard javascript context can access them
        window.firebaseDB = db;
        window.firestoreGetDocs = getDocs;
        window.firestoreCollection = collection;
        window.firestoreDoc = doc;
        window.firestoreGetDoc = getDoc;
        window.firestoreUpdateDoc = updateDoc;

        // AUTH CONTROL WATCHER: Safely toggles interface visibility frames
        onAuthStateChanged(auth, (user) => {
            const overlay = document.getElementById("login-overlay");
            const appWrapper = document.getElementById("admin-app");

            if (user) {
                overlay.classList.add("hidden");
                appWrapper.classList.remove("hidden");
                loadAdminDashboardData();
            } else {
                overlay.classList.remove("hidden");
                appWrapper.classList.add("hidden");
                document.getElementById("admin-main-container").classList.add("hidden");
                document.getElementById("loading-fallback").style.display = "block";
            }
        });

        window.handleLogin = async () => {
            const email = document.getElementById("login-email").value.trim();
            const pass = document.getElementById("login-password").value;
            const errBox = document.getElementById("login-error");
            const btn = document.getElementById("login-btn");

            errBox.classList.add("hidden");
            if(!email || !pass) {
                errBox.textContent = "Please fill in all fields.";
                errBox.classList.remove("hidden");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Verifying Token...";

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById("login-email").value = "";
                document.getElementById("login-password").value = "";
            } catch (error) {
                console.error(error);
                errBox.textContent = "Access Denied: Invalid credentials.";
                errBox.classList.remove("hidden");
            } finally {
                btn.disabled = false;
                btn.textContent = "Secure Sign In";
            }
        };

        window.handleLogout = () => {
            signOut(auth);
        };
    </script>

    <!-- UI Component Rendering Actions Script -->
    <script>
        let localDashboardCategories = [];

        async function loadAdminDashboardData() {
            try {
                const configDocRef = window.firestoreDoc(window.firebaseDB, "settings", "config");
                const configSnap = await window.firestoreGetDoc(configDocRef);
                if (configSnap.exists()) {
                    document.getElementById("wa-input").value = configSnap.data().whatsapp_phone || "";
                }

                const querySnapshot = await window.firestoreGetDocs(window.firestoreCollection(window.firebaseDB, "categories"));
                let categoriesList = [];
                querySnapshot.forEach((doc) => {
                    categoriesList.push({ docId: doc.id, ...doc.data() });
                });

                categoriesList.sort((a, b) => a.docId.localeCompare(b.docId));
                localDashboardCategories = categoriesList;

                renderAdminControlInterface();
            } catch (error) {
                console.error("Dashboard failed to retrieve dataset nodes:", error);
                document.getElementById("loading-fallback").textContent = "Access denied or rules restriction. Please verify account permissions.";
            }
        }

        function renderAdminControlInterface() {
            document.getElementById("loading-fallback").style.display = "none";
            const mainContainer = document.getElementById("admin-main-container");
            mainContainer.innerHTML = "";
            mainContainer.classList.remove("hidden");

            localDashboardCategories.forEach((category, catIndex) => {
                const catBox = document.createElement("section");
                catBox.className = "bg-zinc-950 border border-zinc-900 rounded-3xl p-6 shadow-xl mb-6";

                let headerBlock = `
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between border-b border-zinc-900 pb-4 mb-4 gap-4">
                        <div class="flex items-center gap-3">
                            ${category.image ? `<img src="${category.image}" class="w-10 h-10 rounded-xl object-cover border border-zinc-800">` : ""}
                            <div>
                                <h2 class="text-base font-black text-white">${category.name_en} <span class="text-zinc-600 text-xs font-normal">(${category.docId})</span></h2>
                                <p class="text-xs text-zinc-500">${category.name_ar} • ${category.name_ku}</p>
                            </div>
                        </div>
                        <button onclick="toggleNewItemForm('${category.docId}')" class="bg-zinc-900 hover:bg-zinc-800 text-yellow-400 font-bold text-xs px-3 py-1.5 rounded-xl border border-zinc-800 transition cursor-pointer">
                            + Add Item
                        </button>
                    </div>`;

                // Hidden inline creation row form
                let newItemFormBlock = `
                    <div id="form-new-${category.docId}" class="hidden bg-zinc-900/40 border border-zinc-900 rounded-2xl p-4 mb-4 space-y-3">
                        <p class="text-[11px] uppercase font-bold tracking-wider text-yellow-400/80">Add New Item to ${category.name_en}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-4 gap-2">
                            <input type="text" id="add-en-${category.docId}" placeholder="English Name" class="bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-1.5 text-xs text-white outline-none focus:border-yellow-400">
                            <input type="text" id="add-ku-${category.docId}" placeholder="Kurdish Name" class="bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-1.5 text-xs text-white outline-none focus:border-yellow-400 text-right">
                            <input type="text" id="add-ar-${category.docId}" placeholder="Arabic Name" class="bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-1.5 text-xs text-white outline-none focus:border-yellow-400 text-right">
                            <input type="number" id="add-price-${category.docId}" placeholder="Price (IQD)" class="bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-1.5 text-xs text-yellow-400 font-bold outline-none focus:border-yellow-400">
                        </div>
                        <div class="flex justify-end gap-2 text-xs">
                            <button onclick="toggleNewItemForm('${category.docId}')" class="bg-transparent hover:bg-zinc-900 text-zinc-500 px-3 py-1.5 rounded-lg transition font-medium cursor-pointer">Cancel</button>
                            <button onclick="submitNewItem('${catIndex}', '${category.docId}')" class="bg-yellow-400 hover:bg-yellow-500 text-black font-extrabold px-4 py-1.5 rounded-lg transition cursor-pointer">Save Item</button>
                        </div>
                    </div>`;

                let itemsTableBlock = `<div class="overflow-x-auto"><table class="w-full text-left border-collapse text-xs">
                    <thead>
                        <tr class="border-b border-zinc-900 text-zinc-500 uppercase tracking-wider font-bold">
                            <th class="py-2 pr-2">English Name</th>
                            <th class="py-2 pr-2">Kurdish Name</th>
                            <th class="py-2 pr-2">Arabic Name</th>
                            <th class="py-2 pr-2 w-28">Price (IQD)</th>
                            <th class="py-2 text-center w-20">Status</th>
                        </tr>
                    </thead>
                    <tbody>`;

                if (category.items && Array.isArray(category.items)) {
                    category.items.forEach((item, itemIndex) => {
                        const isEnabled = item.enabled !== false;
                        itemsTableBlock += `
                            <tr class="border-b border-zinc-900/50 hover:bg-zinc-900/20">
                                <td class="py-3 pr-2 font-semibold text-zinc-200">${item.name_en}</td>
                                <td class="py-3 pr-2 text-zinc-400 font-medium">${item.name_ku || ""}</td>
                                <td class="py-3 pr-2 text-zinc-400 font-medium">${item.name_ar || ""}</td>
                                <td class="py-3 pr-2">
                                    <input type="number" value="${item.price}" 
                                        onchange="updateItemPrice(${catIndex}, ${itemIndex}, this.value)" 
                                        class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-2 py-1 text-yellow-400 font-bold outline-none focus:border-yellow-400">
                                </td>
                                <td class="py-3 text-center">
                                    <button onclick="toggleItemVisibility(${catIndex}, ${itemIndex}, ${isEnabled})" 
                                        class="px-2.5 py-1 rounded-md text-[10px] font-black uppercase cursor-pointer transition ${isEnabled ? 'bg-green-500/10 text-green-400 border border-green-500/20 hover:bg-green-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20'}">
                                        ${isEnabled ? 'Active' : 'Hidden'}
                                    </button>
                                </td>
                            </tr>`;
                    });
                }

                itemsTableBlock += `</tbody></table></div>`;
                catBox.innerHTML = headerBlock + newItemFormBlock + itemsTableBlock;
                mainContainer.appendChild(catBox);
            });
        }

        function toggleNewItemForm(docId) {
            const rowForm = document.getElementById(`form-new-${docId}`);
            rowForm.classList.toggle("hidden");
        }

        async function submitNewItem(catIndex, docId) {
            const targetCat = localDashboardCategories[catIndex];
            
            const nameEn = document.getElementById(`add-en-${docId}`).value.trim();
            const nameKu = document.getElementById(`add-ku-${docId}`).value.trim();
            const nameAr = document.getElementById(`add-ar-${docId}`).value.trim();
            const priceVal = parseFloat(document.getElementById(`add-price-${docId}`).value);

            if (!nameEn || isNaN(priceVal)) {
                return alert("At minimum, an English Name and a valid numeric Price are required.");
            }

            // Create structure framework item mapping
            const newItem = {
                name_en: nameEn,
                name_ku: nameKu || nameEn,
                name_ar: nameAr || nameEn,
                price: priceVal,
                enabled: true
            };

            if(!targetCat.items) targetCat.items = [];
            targetCat.items.push(newItem);

            try {
                const docRef = window.firestoreDoc(window.firebaseDB, "categories", docId);
                await window.firestoreUpdateDoc(docRef, { items: targetCat.items });
                
                // Live rebuild rendering
                renderAdminControlInterface();
            } catch (err) {
                alert("Could not append item to cloud instance: " + err.message);
            }
        }

        async function updateWhatsAppNumber() {
            const val = document.getElementById("wa-input").value.trim();
            if (!val) return alert("Enter a functional mobile number.");
            
            try {
                const configDocRef = window.firestoreDoc(window.firebaseDB, "settings", "config");
                await window.firestoreUpdateDoc(configDocRef, { whatsapp_phone: val });
                alert("Global WhatsApp Target saved successfully!");
            } catch (err) {
                alert("Database push permission error: " + err.message);
            }
        }

        async function updateItemPrice(catIndex, itemIndex, newPrice) {
            const targetCat = localDashboardCategories[catIndex];
            const parsedPrice = parseFloat(newPrice);
            if (isNaN(parsedPrice)) return alert("Invalid price point entered.");

            targetCat.items[itemIndex].price = parsedPrice;

            try {
                const docRef = window.firestoreDoc(window.firebaseDB, "categories", targetCat.docId);
                await window.firestoreUpdateDoc(docRef, { items: targetCat.items });
            } catch (err) {
                alert("Error modifying dataset node: " + err.message);
            }
        }

        async function toggleItemVisibility(catIndex, itemIndex, currentStatus) {
            const targetCat = localDashboardCategories[catIndex];
            targetCat.items[itemIndex].enabled = !currentStatus;

            try {
                const docRef = window.firestoreDoc(window.firebaseDB, "categories", targetCat.docId);
                await window.firestoreUpdateDoc(docRef, { items: targetCat.items });
                renderAdminControlInterface(); 
            } catch (err) {
                alert("Failed toggling target structural configuration: " + err.message);
            }
        }
    </script>
</body>
</html>
